<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>
    <style>
        body {
            background-color: rgb(241, 241, 245);
            margin: 0;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .nav-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: white;
            border-bottom: 1px solid #ccc;
        }
        .menu ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }
        .cart-container {
            padding: 20px;
        }
        .cart-item {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-btn {
            background-color: red;
            color: white;
            padding: 5px 10px;
            border: none;
            cursor: pointer;
            border-radius: 3px;
        }
        .remove-btn:hover {
            background-color: darkred;
        }
    </style>
</head>
<body>
    <div class="nav-bar">
        <div id="logo">
            <a href="index.html"><strong>WATCHES</strong></a>
        </div>
        <div class="menu">
            <ul>
                <li><a href="payment1.html">Order now (<span id="cart-count">0</span>)</a></li>
                <li><a href="home.html">Back to Shop</a></li>
            </ul>
        </div>
    </div>

    <div class="cart-container">
        <h2>Your Cart</h2>
        <div id="cart-items"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            displayCartItems();
            updateCounts();
        });

        function displayCartItems() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            let cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            
            if (cart.length === 0) {
                cartItems.innerHTML = '<p>Your cart is empty.</p>';
                return;
            }
            
            cart.forEach((item, index) => {
                let div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = `<span>${item}</span> <button class="remove-btn" onclick="removeFromCart(${index})">Remove</button>`;
                cartItems.appendChild(div);
            });
        }

        function removeFromCart(index) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cart));
            displayCartItems();
            updateCounts();
        }

        function updateCounts() {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            document.getElementById('cart-count').textContent = cart.length;
        }
    </script>
</body>
</html>
